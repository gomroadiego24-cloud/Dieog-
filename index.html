<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Brenda ❤️</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #ff4d6d, #c9184a);
  font-family: Arial;
  text-align: center;
  color: white;
  overflow: hidden;
}

h1 {
  margin-top: 30px;
  font-size: 40px;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #fff; }
  to { text-shadow: 0 0 40px #ffd6e0; }
}

h2 {
  margin-top: -10px;
}

.heart {
  position: relative;
  width: 320px;
  height: 300px;
  margin: 30px auto;
}

.heart img {
  position: absolute;
  width: 85px;
  height: 85px;
  border-radius: 12px;
  object-fit: cover;
}

.img1 { top: 60px; left: 0; }
.img2 { top: 0; left: 70px; }
.img3 { top: 0; right: 70px; }
.img4 { top: 60px; right: 0; }

p {
  padding: 20px;
  font-size: 18px;
}

</style>
</head>

<body>

<h1>TE AMO ❤️</h1>
<h2>Brenda Guadalupe 💖</h2>

<div class="heart">
  <img src="Foto1.jpg" class="img1">
  <img src="Foto2.jpg" class="img2">
  <img src="Foto3.jpg" class="img3">
  <img src="Foto4.jpg" class="img4">
</div>

<p>
No existe forma de medir lo que siento por ti…<br><br>
Te amo más de lo que puedo decir ❤️
</p>

</body>
</html>
